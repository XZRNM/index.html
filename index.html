<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>life thought</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    

   <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Sevillana&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --heading-font: 'Playfair Display', serif;
            --text-font: 'Sevillana', cursive;
            --secondry-color: red
        }

        body {
            background-color: #f8f9fa;
            padding: 150px 0;
            font-family: var(--text-font);
        }

        .container .card {
            max-width: 300px;
            height: 255px;
            margin: 80px auto;
            padding: 20px 15px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            transition: 0.3s ease-in-out;
            position: relative;
            background: plum;
            border: none;
        }

        .container .card:hover {
            height: 550px;
        }

        .imgContainer {
            position: relative;
            width: 250px;
            height: 250px;
            top: -50px;
            left: 10px;
            z-index: 1;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .imgContainer img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: 50% 35%;
            border-radius: 10px;
            transition: transform 0.4s ease;
        }

        .container .card:hover .imgContainer img {
            transform: scale(1.05);
        }

        .content {
            position: relative;
            margin-top: -140px;
            padding: 10px 15px;
            text-align: center;
            color: #111;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s ease-in-out;
        }

        .container .card:hover .content {
            visibility: visible;
            opacity: 1;
            margin-top: -40px;
        }

        .content h2 {
            color: var(--secondry-color);
            font-family: var(--heading-font);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .content p {
            color: orangered;
            font-size: 18px;
            font-family: var(--text-font);
            font-style: italic;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="d-flex align-items-center justify-content-center">
            
            <div class="card d-flex position-relative flex-column">
                <div class="imgContainer">
                    <img src="https://github.com/XZRNM/index.html/blob/main/index.html" alt="Tailini Rossi">
                </div>
                <div class="content">
                    <h2>Te amo minha Bebezona 💖</h2>
                    <p>
                        Minha Eterna bebezona, te amo mais do que as palavras podem expressar,você é e sempre sera aquela que o meu coração deseja, Todos os dias da minha vida quero ter o previlégio de dizer TE AMO
                    </p>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
